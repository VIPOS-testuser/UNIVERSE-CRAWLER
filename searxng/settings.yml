use_default_settings: true
server:
    port: 8080
    bind_address: "0.0.0.0"
    secret_key: "universe_exe_secret_key" # Ixtiyoriy maxfiy so'z
search:
    formats:
        - html
        - json
engines:
  - name: google
    engine: google
    shortcut: g
  - name: bing
    engine: bing
    shortcut: b
  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
  - name: brave
    engine: brave
    shortcut: br
  - name: wikipedia
    engine: wikipedia
    shortcut: w
  - name: qwant
    engine: qwant
    shortcut: qw
  - name: startpage
    engine: startpage
    shortcut: sp
  - name: yahoo
    engine: yahoo
    shortcut: y
  - name: reddit
    engine: reddit
    shortcut: re

# UI sozlamalari
ui:
    static_path: ""
    templates_path: ""
    default_locale: "en"
